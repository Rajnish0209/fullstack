<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn MERN</title>
  </head>
  <body>
    <p class="cat">My cat is <strong>very </strong>grumpy</p>
    <p>
      This is a single paragraph, but we are going to <br />break it onto two
      lines.
    </p>
    <img
      src="https://mdn.github.io/shared-assets/images/examples/fx-nightly-512.png"
      alt="The Firefox Nightly icon"
      width="300"
      height="300"
    />
    <img
      src="https://cdn.pixabay.com/photo/2014/03/29/09/17/cat-300572_1280.jpg"
      alt="cat image"
      width="300"
    />
    <form action="/">
      <label for="username">Username:</label>
      <input
        id="username"
        type="text"
        name="username"
        placeholder="username"
        value="rajnish12"
        required
      />
      <label for="city">City:</label>
      <input
        type="text"
        name="city"
        placeholder="city"
        value="Ballia"
        required
        id="city"
      />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
